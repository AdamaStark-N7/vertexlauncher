#
# Reference manifest for a locally staged x86_64 bundle.
# Release exports are generated by scripts/build-flatpak.sh, which writes
# arch-specific manifests under flatpak/generated/ around the prebuilt
# CentOS 7 AppDir whose launcher ELF is capped at GLIBC_2.17.
#
app-id: io.github.SturdyFool10.VertexLauncher
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: vertexlauncher-flatpak
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --env=GDK_BACKEND=wayland,x11
modules:
  - name: vertexlauncher-bundle
    buildsystem: simple
    build-commands:
      - mkdir -p /app
      - install -Dm755 vertexlauncher-flatpak /app/bin/vertexlauncher-flatpak
      - install -Dm644 io.github.SturdyFool10.VertexLauncher.metainfo.xml /app/share/metainfo/io.github.SturdyFool10.VertexLauncher.metainfo.xml
      - install -Dm644 io.github.SturdyFool10.VertexLauncher.png /app/share/icons/hicolor/256x256/apps/io.github.SturdyFool10.VertexLauncher.png
      - cp -a bundle/. /app/
    sources:
      - type: dir
        path: generated/source-x86_64
