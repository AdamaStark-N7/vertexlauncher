<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: {{BG}};
      --panel: {{PANEL}};
      --border: {{BORDER}};
      --text: {{TEXT}};
      --muted: {{MUTED}};
      --accent: {{ACCENT}};
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top, {{PRIMARY_TINT}}, transparent 40%),
        linear-gradient(160deg, var(--bg) 0%, var(--panel) 52%, var(--bg) 100%);
      color: var(--text);
    }
    .panel {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 22px 60px color-mix(in oklch, var(--bg) 60%, black);
      overflow: hidden;
    }
    .stripe {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), color-mix(in oklch, var(--accent) 40%, transparent));
    }
    .content {
      padding: 28px 30px 26px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 11px;
      border-radius: 999px;
      background: color-mix(in oklch, var(--accent) 16%, transparent);
      border: 1px solid color-mix(in oklch, var(--accent) 35%, transparent);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: clamp(28px, 5vw, 38px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }
    .detail {
      margin-top: 16px;
      padding: 13px 15px;
      border-radius: 12px;
      background: color-mix(in oklch, var(--bg) 80%, transparent);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-family: "Consolas", "Cascadia Code", "Fira Code", monospace;
      line-height: 1.55;
      word-break: break-word;
      opacity: 0.85;
    }
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }
    .timer {
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="stripe"></div>
    <section class="content">
      <div class="badge">{{BADGE}}</div>
      <h1>{{TITLE}}</h1>
      <p>{{MESSAGE}}</p>
      {{DETAIL_HTML}}
      <div class="footer">
        <span>This tab should close automatically.</span>
        <span class="timer">Closing in <span id="countdown">{{AUTO_CLOSE_SECS}}</span>s</span>
      </div>
    </section>
  </main>
  <script>
    let remaining = {{AUTO_CLOSE_SECS}};
    const countdown = document.getElementById("countdown");
    const tick = () => {
      remaining -= 1;
      if (remaining >= 0 && countdown) countdown.textContent = String(remaining);
      if (remaining <= 0) {
        window.close();
        setTimeout(() => window.location.replace("about:blank"), 150);
        return;
      }
      setTimeout(tick, 1000);
    };
    setTimeout(tick, 1000);
  </script>
</body>
</html>
